name: Check Type Safety

on:
 push:
   branches: "**"
jobs:
 check-type-safety:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4

     - name: "Set up Python"
       uses: actions/setup-python@v6
       with:
          python-version-file: "pyproject.toml"

     - name: Install uv
       uses: astral-sh/setup-uv@v7
       with:
          version: "0.11.1"

     - run: uv sync
     - run: uv run pyright
