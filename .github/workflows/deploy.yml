name: Deploy

on:
 workflow_run:
   workflows: ["Check Type Safety", "Check Formatter", "Check Linter", "Run Unit Tests"]
   branches: [main]
   types: [completed]
jobs:
 build-and-push:
   runs-on: ubuntu-latest
   if: ${{ github.event.workflow_run.conclusion == 'success' }}
   steps:
     - uses: actions/checkout@v4

     - name: Log in to Docker Hub
       uses: docker/login-action@v3
       with:
         username: ${{ secrets.DOCKERHUB_USERNAME }}
         password: ${{ secrets.DOCKERHUB_TOKEN }}

     - name: Build and push
       uses: docker/build-push-action@v6
       with:
         push: true
         tags: ${{ secrets.DOCKERHUB_USERNAME }}/dice:latest

 deploy:
   needs: build-and-push
   runs-on: ubuntu-latest
   steps:
     - name: Trigger deploy on Render
       run: curl "${{ secrets.DEPLOY_WEBHOOK_URL }}&imgURL=docker.io%2F${{ secrets.DOCKERHUB_USERNAME }}%2Fdice%3Alatest"
